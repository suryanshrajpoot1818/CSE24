<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOROFLOOP</title>
</head>
<body>
    <script> 
   let student = {
      name : "Suryansh",
      age : 18,
      branch : "CSE",
      section : "cse 24",
   };

   for(let key in student){
    console.log("key = ",key, "value =",student[key]);
   }
    </script>
</body>
</html>



// <!-- GENERAL SYNTAX : used in objects and arrays to get object keys
returns the keys of the object : name age branch section;
