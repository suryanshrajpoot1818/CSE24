<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPERATORS</title>
</head>
<body>
    <script type="text/javascript">
        var a = 40;
        var b = 20;
        var result;

        result = a + b;
        console.log("a + b = " + result);

        result = a * b;
        console.log("a * b = " + result);

        result = a - b;
        console.log("a - b = " + result);

        result = a / b;
        console.log("a / b = " + result);

        result = a % b;
        console.log("a % b = " + result);
    </script>
</body>
</html>
