<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maximum</title>
</head>
<body>

<script type="text/javascript">

    var x = 20;
    var y = 15;
    var z = 10;

    var max = (x > y) 
                ? (x > z ? x : z) 
                : (y > z ? y : z);

    console.log("Maximum = " + max);

</script>

</body>
</html>
