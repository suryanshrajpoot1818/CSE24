<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARRAYS</title>
</head>
<body>
    <script>
           let arr = [1, 2, 3, 4, 5, 6, 7];
           arr.splice(2, 2, 101, 102);

        //  ADD ELEMENT 
         arr.splice(3,1);

        //  DELETE ELEMENT
         arr.splice(3,1);

        //  REPLACE ELEMENT
         arr.splice(3, 1, 101);

        //  UNSHIFT() : ADDS TO Start 
        //  SHIFT() : DELETE FROM start & return 
        //  SLICE : RETURNS A PIECE OF THE ARRAY // slice(startidx, endidx);
        //  SPLICE() : change original array (add, remove , replace) // splice(startidx, delcount , newelt);
        prompt("enter the mode you want to change");
        console.dir(document.body.style.background = "green");


    </script>
</body>
