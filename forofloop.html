<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOROFLOOP</title>
</head>
<body>
    <script> 
    let length = 0;   
let str = "Suryansh";
for(let i of str){
    console.log("i is :", i);
    length++;
}
console.log("size of the string is:", length);
    </script>
</body>
